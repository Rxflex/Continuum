<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#090c10" />
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGrad)" />

  <g opacity="0.15">
    <path d="M0,100 C400,200 800,0 1280,150" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="10,10" />
    <path d="M0,500 C400,600 800,400 1280,550" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="10,10" />
    <path d="M400,0 C300,300 600,400 700,640" fill="none" stroke="#06b6d4" stroke-width="1" />
    <path d="M800,0 C700,300 1000,400 1100,640" fill="none" stroke="#06b6d4" stroke-width="1" />
  </g>

  <g transform="translate(900, 320)">

    <path d="M0,0 Q-150,-200 -200,-120 T-250,50" fill="none" stroke="url(#purpleGrad)" stroke-width="3" opacity="0.4" />
    <path d="M0,0 Q-50,200 -180,180 T-300,80" fill="none" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.4" />
    <path d="M0,0 Q150,-150 250,-80 T280,50" fill="none" stroke="url(#cyanGrad)" stroke-width="3" opacity="0.4" />
    <path d="M0,0 L180,150 L80,220" fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.3" />
    <path d="M-200,-120 L-100,-220 L50,-180" fill="none" stroke="url(#orangeGrad)" stroke-width="2" opacity="0.3" />

    <line x1="0" y1="0" x2="-200" y2="-120" stroke="url(#purpleGrad)" stroke-width="4" opacity="0.7" />
    <line x1="0" y1="0" x2="-180" y2="180" stroke="url(#orangeGrad)" stroke-width="4" opacity="0.7" />
    <line x1="0" y1="0" x2="200" y2="-60" stroke="url(#cyanGrad)" stroke-width="4" opacity="0.7" />
    <line x1="0" y1="0" x2="180" y2="150" stroke="url(#purpleGrad)" stroke-width="4" opacity="0.7" />

    <path d="M-50,-30 L-150,-90" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6,6" marker-end="url(#arrow)" />
    <path d="M-130,130 L-30,20" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,6" />

    <circle cx="-200" cy="-120" r="24" fill="url(#purpleGrad)" filter="url(#glowSmall)" />
    <circle cx="-200" cy="-120" r="12" fill="#0d1117" />
    <circle cx="-180" cy="180" r="28" fill="url(#orangeGrad)" filter="url(#glowSmall)" />
    <circle cx="-180" cy="180" r="14" fill="#0d1117" />
    <circle cx="200" cy="-60" r="20" fill="url(#cyanGrad)" filter="url(#glowSmall)" />
    <circle cx="200" cy="-60" r="10" fill="#0d1117" />
    <circle cx="180" cy="150" r="16" fill="url(#purpleGrad)" filter="url(#glowSmall)" />
    <circle cx="-250" cy="50" r="12" fill="url(#cyanGrad)" />
    <circle cx="280" cy="50" r="14" fill="url(#orangeGrad)" />
    <circle cx="80" cy="220" r="10" fill="url(#cyanGrad)" />
    <circle cx="-100" cy="-220" r="12" fill="url(#orangeGrad)" />
    <circle cx="50" cy="-180" r="16" fill="url(#purpleGrad)" />

    <circle cx="0" cy="0" r="48" fill="url(#orangeGrad)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="38" fill="#0d1117" />
    <circle cx="0" cy="0" r="20" fill="url(#purpleGrad)" />
  </g>

  <g transform="translate(120, 300)">
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="112" font-weight="900" fill="#ffffff" letter-spacing="-2">
      Continuum
    </text>

    <text x="5" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#8b949e">
      Persistent multi-agent MCP server
    </text>

    <text x="5" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#8b949e">
      for live code graphs &amp; shared memory
    </text>

    <rect x="5" y="180" width="120" height="6" rx="3" fill="url(#orangeGrad)" filter="url(#glowSmall)" />
    <rect x="135" y="180" width="40" height="6" rx="3" fill="url(#purpleGrad)" />
  </g>
</svg>
